<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>독립운동가 AI 분류 수업</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-card {
      position: relative;
      overflow: hidden;
      width: min(440px, 100%);
      text-align: center;
    }

    .route-strip {
      position: absolute;
      inset: 0 0 auto;
      height: 8px;
      background: linear-gradient(90deg, #3B82F6, #EF4444, #22C55E, #F97316);
    }

    .auth-card h1 {
      margin-top: 18px;
      font-size: 2rem;
    }

    .screen {
      display: none;
    }

    .screen.active {
      display: grid;
      gap: 18px;
    }

    .top-actions {
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 2;
    }

    .student-line {
      display: inline-flex;
      justify-content: center;
      padding: 10px 14px;
      border-radius: 999px;
      color: var(--muted);
      background: #eef2f7;
      font-weight: 800;
    }

    .message {
      min-height: 24px;
      color: var(--muted);
      line-height: 1.6;
    }

    .message.error {
      color: #dc2626;
      font-weight: 800;
    }

    .spinner {
      width: 38px;
      height: 38px;
      margin: 0 auto;
      border: 4px solid #dbe4f0;
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <div class="top-actions">
    <button id="logoutButton" class="secondary" type="button" hidden>로그아웃</button>
  </div>

  <main class="app-shell">
    <section class="panel auth-card">
      <div class="route-strip" aria-hidden="true"></div>
      <h1>독립운동가 AI 분류 수업</h1>

      <div id="loadingScreen" class="screen active" aria-live="polite">
        <div class="spinner" aria-label="로딩 중"></div>
        <p id="loadingMessage" class="message">로그인 상태를 확인하고 있습니다.</p>
      </div>

      <div id="loginScreen" class="screen">
        <p class="lead">학교 Google 계정으로 입장하세요.</p>
        <button id="googleLoginButton" class="primary" type="button">구글로 로그인</button>
      </div>

      <form id="nameScreen" class="screen" novalidate>
        <p class="lead">안녕하세요! 처음 오셨군요. 이름을 입력해주세요 😊</p>
        <label>
          이름
          <input id="studentName" type="text" autocomplete="name" placeholder="예: 김민준" maxlength="5" required>
        </label>
        <button class="primary" type="submit">확인</button>
        <p id="nameMessage" class="message" aria-live="polite"></p>
      </form>

      <div id="waitingScreen" class="screen">
        <p class="lead">선생님이 곧 시작합니다 🙂</p>
        <div id="studentInfo" class="student-line"></div>
        <p id="phaseMessage" class="message">수업 시작 신호를 기다리고 있습니다.</p>
      </div>

      <p id="authMessage" class="message" aria-live="assertive"></p>
    </section>
  </main>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
